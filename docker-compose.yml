# Full stack: MongoDB + the NestJS app (which also serves the built React SPA).
#   docker compose up --build      then open http://localhost:3000
# Data persists in the named volume `mongo-data` across `docker compose down`/up.
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build: .
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/payroll
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      PORT: "3000"
    ports:
      - "3000:3000"

volumes:
  mongo-data:
